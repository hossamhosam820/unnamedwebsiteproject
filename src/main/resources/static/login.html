<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Secure Access</title>
    <link href="css/login.css" rel="stylesheet" />
</head>

<body>

    <div class="login-container">
        <h2>UniRoom</h2>
        <h4 id="accountcreated">Account created successfully</h4>
        <form action="/api/auth/login" method="POST">
            <div class="form-item">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="enter your email" required>
            </div>
            <div class="form-item">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="enter your password" required>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
        <p class="signup-link">
            Don't have an account? <a href="/signup">Sign up here</a>
        </p>
    </div>

</body>
<script>const isok = new URLSearchParams(window.location.search).has('OK'); if (isok) {
        document.getElementById("accountcreated").style.display = "";
    }
    else {
        document.getElementById("accountcreated").style.display = "none";
    }
</script>


</html>
